<div class="battery-wrapper">

  <!-- TOP -->
  <div class="battery-box">
    <span class="label">🔋 NÍVEL DA BATERIA</span>
    <h1 id="battery_level">--%</h1>
    <span class="status" id="battery_status">--</span>
  </div>

  <!-- BATERIA VISUAL -->
  <div class="battery-visual">
    <div class="battery-body">
      <div id="battery_fill"></div>
    </div>
    <div class="battery-tip"></div>
  </div>

  <!-- BOTTOM -->
  <div class="battery-box">
    <span class="label"> ⏱ TEMPO DE CARGA</span>
    <h1 id="battery_load">--%</h1>
    <span class="status" id="battery_mode">--</span>
  </div>

</div>
